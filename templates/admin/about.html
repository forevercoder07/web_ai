{% extends 'admin/base.html' %}
{% block title %}About{% endblock %}
{% block topbar_title %}About Tahrirlash{% endblock %}

{% block content %}
<div class="page-header">
    <div>
        <div class="page-title">// ABOUT_EDIT</div>
    </div>
</div>

<div class="card">
    <div class="card-body">
        <form method="POST" enctype="multipart/form-data">
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:1.5rem;">
                <div class="form-group">
                    <label class="form-label">To'liq Ism</label>
                    <input type="text" name="name" class="form-control"
                           value="{{ about.name }}" placeholder="Your Full Name" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Kasb / Unvon</label>
                    <input type="text" name="title" class="form-control"
                           value="{{ about.title }}" placeholder="Full Stack Developer">
                </div>
                <div class="form-group">
                    <label class="form-label">Manzil</label>
                    <input type="text" name="location" class="form-control"
                           value="{{ about.location }}" placeholder="Tashkent, Uzbekistan">
                </div>
                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input type="email" name="email" class="form-control"
                           value="{{ about.email }}" placeholder="your@email.com">
                </div>
                <div class="form-group">
                    <label class="form-label">GitHub URL</label>
                    <input type="url" name="github" class="form-control"
                           value="{{ about.github or '' }}" placeholder="https://github.com/username">
                </div>
                <div class="form-group">
                    <label class="form-label">LinkedIn URL</label>
                    <input type="url" name="linkedin" class="form-control"
                           value="{{ about.linkedin or '' }}" placeholder="https://linkedin.com/in/username">
                </div>
                <div class="form-group">
                    <label class="form-label">Telegram URL</label>
                    <input type="url" name="telegram" class="form-control"
                           value="{{ about.telegram or '' }}" placeholder="https://t.me/username">
                </div>
                <div class="form-group">
                    <label class="form-label">Avatar Rasmi</label>
                    <input type="file" name="avatar" class="form-control" id="avatar" accept="image/*">
                    {% if about.avatar and about.avatar != 'default_avatar.png' %}
                    <img src="{{ url_for('static', filename='uploads/' + about.avatar) }}"
                         class="image-preview" style="margin-top:0.75rem" alt="Avatar">
                    {% endif %}
                    <img id="avatar_preview" class="image-preview" style="display:none; margin-top:0.75rem" alt="">
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Biografiya / Men Haqimda</label>
                <textarea name="content" class="form-control" rows="8"
                          placeholder="O'zingiz haqingizda yozing...">{{ about.content }}</textarea>
            </div>

            <button type="submit" class="btn btn-primary">
                <i class="fas fa-save"></i> Saqlash
            </button>
        </form>
    </div>
</div>
{% endblock %}
