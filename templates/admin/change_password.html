{% extends 'admin/base.html' %}
{% block title %}Parol O'zgartirish{% endblock %}
{% block topbar_title %}Parol O'zgartirish{% endblock %}

{% block content %}
<div style="max-width: 480px;">
    <div class="card">
        <div class="card-header">
            <span class="card-title">// CHANGE_PASSWORD</span>
        </div>
        <div class="card-body">
            <form method="POST">
                <div class="form-group">
                    <label class="form-label">Joriy Parol</label>
                    <input type="password" name="current_password" class="form-control" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Yangi Parol</label>
                    <input type="password" name="new_password" class="form-control"
                           minlength="8" placeholder="Kamida 8 ta belgi" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Yangi Parolni Tasdiqlang</label>
                    <input type="password" name="confirm_password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary btn-full">
                    <i class="fas fa-lock"></i> O'zgartirish
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
